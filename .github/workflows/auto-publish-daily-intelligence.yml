name: Auto Publish Daily Intelligence

on:
  repository_dispatch:
    types:
      - coze_daily_intelligence
      - coze_market_radar_report
  schedule:
    # Beijing time 07:45 on weekdays (previous UTC calendar day).
    - cron: "45 23 * * 0-4"
    # Beijing time 08:05, 08:15, and 08:25 on weekdays. Target: published before 08:30.
    # Repository dispatch from Coze at about 07:30 remains the primary trigger.
    - cron: "5,15,25 0 * * 1-5"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Daily report date to publish, YYYY-MM-DD. Defaults to today's date in Asia/Shanghai."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: daily-intelligence-autopublish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DEFAULT_VAULT_REPO: rachelao2828-X/Rachel-Capital-OS-Vault
      TARGET_DIR: 31_Inbox/Daily_Intelligence
      MARKET_RADAR_TARGET_DIR: 31_Inbox/Market_Radar
    steps:
      - name: Resolve report date
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.date }}" ]; then
            REPORT_DATE="${{ github.event.client_payload.date }}"
          elif [ -n "${{ inputs.report_date }}" ]; then
            REPORT_DATE="${{ inputs.report_date }}"
          else
            REPORT_DATE="$(TZ=Asia/Shanghai date +%F)"
          fi
          MONTH_START="${REPORT_DATE%-??}-01"
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_ENV"
          echo "MONTH_START=${MONTH_START}" >> "$GITHUB_ENV"
          echo "Publishing public content for ${REPORT_DATE}"

      - name: Check vault sync token
        run: |
          if [ -z "${{ secrets.VAULT_SYNC_TOKEN }}" ]; then
            echo "Missing repository secret: VAULT_SYNC_TOKEN"
            echo "Create a fine-grained GitHub token with Contents read/write access to the private Obsidian vault repo."
            exit 1
          fi

      - name: Checkout web platform
        uses: actions/checkout@v4
        with:
          path: web-platform
          ref: main

      - name: Checkout Obsidian vault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.OBSIDIAN_VAULT_REPO || env.DEFAULT_VAULT_REPO }}
          token: ${{ secrets.VAULT_SYNC_TOKEN }}
          path: obsidian-vault
          ref: main

      - name: Write Coze dispatch payload to Obsidian
        if: github.event_name == 'repository_dispatch'
        working-directory: web-platform
        run: |
          if [ "${{ github.event.action }}" = "coze_market_radar_report" ]; then
            python3 scripts/write_coze_market_radar_payload_to_obsidian.py \
              --vault "$GITHUB_WORKSPACE/obsidian-vault"
          else
            python3 scripts/write_coze_daily_payload_to_obsidian.py \
              --vault "$GITHUB_WORKSPACE/obsidian-vault"
          fi

      - name: Check today's Daily Intelligence source
        if: github.event_name != 'repository_dispatch' || github.event.action == 'coze_daily_intelligence'
        working-directory: web-platform
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SOURCE_PATH="$GITHUB_WORKSPACE/obsidian-vault/$TARGET_DIR/${REPORT_DATE:0:4}/${REPORT_DATE:0:7}/${REPORT_DATE}_科技动向日报.md"
          ISSUE_TITLE="日报源文件缺失：${REPORT_DATE}"
          ISSUE_NUMBER="$(gh issue list --state open --limit 100 --json number,title --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" | head -n 1)"

          if [ ! -s "$SOURCE_PATH" ]; then
            MESSAGE="Coze 尚未将 ${REPORT_DATE} 科技动向日报发送到 GitHub。缺失路径：$TARGET_DIR/${REPORT_DATE:0:4}/${REPORT_DATE:0:7}/${REPORT_DATE}_科技动向日报.md。请检查 Coze 的 repository_dispatch 请求及其 HTTP 返回值。"
            echo "::error::$MESSAGE"
            echo "### Daily Intelligence source missing" >> "$GITHUB_STEP_SUMMARY"
            echo "$MESSAGE" >> "$GITHUB_STEP_SUMMARY"
            if [ -z "$ISSUE_NUMBER" ]; then
              gh issue create --title "$ISSUE_TITLE" --body "$MESSAGE"
            else
              gh issue comment "$ISSUE_NUMBER" --body "定时检查仍未发现源文件。运行：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            fi
            exit 1
          fi

          echo "Found Daily Intelligence source: $SOURCE_PATH"
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue close "$ISSUE_NUMBER" --comment "已收到 ${REPORT_DATE} 日报源文件，自动发布流程继续执行。"
          fi

      - name: Normalize Daily Intelligence frontmatter
        if: github.event_name != 'repository_dispatch' || github.event.action == 'coze_daily_intelligence'
        working-directory: web-platform
        run: |
          python3 scripts/normalize_daily_intelligence_frontmatter.py \
            --vault "$GITHUB_WORKSPACE/obsidian-vault" \
            --start-date "$MONTH_START" \
            --end-date "$REPORT_DATE"

      - name: Check Daily Intelligence source quality
        if: github.event_name != 'repository_dispatch' || github.event.action == 'coze_daily_intelligence'
        working-directory: web-platform
        run: |
          python3 scripts/check_daily_source_quality.py \
            --vault "$GITHUB_WORKSPACE/obsidian-vault" \
            --report-date "$REPORT_DATE"

      - name: Save normalized Obsidian metadata
        working-directory: obsidian-vault
        run: |
          if [ "${{ github.event.action }}" = "coze_market_radar_report" ]; then
            TARGET_PATH="$MARKET_RADAR_TARGET_DIR"
            COMMIT_MESSAGE="Add market radar report ${REPORT_DATE}"
          else
            TARGET_PATH="$TARGET_DIR"
            COMMIT_MESSAGE="Normalize daily intelligence metadata ${REPORT_DATE}"
          fi

          if [ -z "$(git status --porcelain -- "$TARGET_PATH")" ]; then
            echo "No Obsidian changes under ${TARGET_PATH}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET_PATH"
          git commit -m "$COMMIT_MESSAGE"
          git push

      - name: Export public site
        working-directory: web-platform
        run: |
          if [ "${{ github.event.action }}" = "coze_market_radar_report" ]; then
            python3 scripts/export_market_radar_incremental.py \
              --vault "$GITHUB_WORKSPACE/obsidian-vault"
          else
            python3 scripts/export_daily_intelligence_incremental.py \
              --vault "$GITHUB_WORKSPACE/obsidian-vault" \
              --report-date "$REPORT_DATE"
          fi

      - name: Check Daily Intelligence completeness
        if: github.event_name != 'repository_dispatch' || github.event.action == 'coze_daily_intelligence'
        working-directory: web-platform
        run: |
          python3 scripts/check_daily_intelligence_completeness.py \
            --vault "$GITHUB_WORKSPACE/obsidian-vault" \
            --start-date "$MONTH_START" \
            --end-date "$REPORT_DATE"

      - name: Commit public site changes
        id: commit-public-site
        working-directory: web-platform
        run: |
          if [ -z "$(git status --porcelain -- public_site)" ]; then
            echo "No public_site changes to publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public_site
          if [ "${{ github.event.action }}" = "coze_market_radar_report" ]; then
            git commit -m "Auto publish market radar ${REPORT_DATE}"
          else
            git commit -m "Auto publish daily intelligence ${REPORT_DATE}"
          fi
          git push origin main
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: steps.commit-public-site.outputs.published == 'true'
        uses: actions/configure-pages@v5

      - name: Upload public site artifact
        if: steps.commit-public-site.outputs.published == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-platform/public_site

      - name: Deploy GitHub Pages
        if: steps.commit-public-site.outputs.published == 'true'
        uses: actions/deploy-pages@v4
