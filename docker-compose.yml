services:
  postgres:
    image: postgres:16-alpine
    container_name: rachel-capital-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rachel_capital}
      POSTGRES_USER: ${POSTGRES_USER:-rachel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rachel-capital-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rachel}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-rachel_capital}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: rachel-capital-streamlit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rachel}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-rachel_capital}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      - api

volumes:
  postgres_data:
